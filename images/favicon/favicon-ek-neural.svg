  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- E — connections -->
  <line x1="9" y1="10" x2="9" y2="54" stroke="#7dd3fc" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="9" y1="10" x2="22" y2="10" stroke="#7dd3fc" stroke-width="1.3" stroke-opacity="0.75"/>
