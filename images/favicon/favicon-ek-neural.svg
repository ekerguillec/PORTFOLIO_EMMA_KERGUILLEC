  <line x1="9" y1="10" x2="19" y2="32" stroke="#7dd3fc" stroke-width="0.6" stroke-opacity="0.2"/>
  <line x1="22" y1="10" x2="9" y2="32" stroke="#7dd3fc" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- K — connections -->
  <line x1="35" y1="10" x2="35" y2="54" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="35" y1="32" x2="55" y2="10" stroke="#ffffff" stroke-width="1.4" stroke-opacity="0.8"/>
