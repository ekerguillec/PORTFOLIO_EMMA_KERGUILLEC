  <line x1="35" y1="54" x2="55" y2="54" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Inter-letter synaptic bridges -->
  <line x1="22" y1="10" x2="35" y2="10" stroke="#7dd3fc" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="19" y1="32" x2="35" y2="32" stroke="#7dd3fc" stroke-width="1.2" stroke-opacity="0.6" stroke-dasharray="2 2"/>
  <line x1="22" y1="54" x2="35" y2="54" stroke="#7dd3fc" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 2"/>

  <!-- E — nodes -->
  <circle cx="9"  cy="10" r="3.2" fill="#060b14" stroke="#7dd3fc" stroke-width="1.3"/>
  <circle cx="9"  cy="32" r="4.0" fill="#060b14" stroke="#7dd3fc" stroke-width="1.7"/>
