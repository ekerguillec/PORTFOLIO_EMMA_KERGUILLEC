  <circle cx="9"  cy="54" r="3.2" fill="#060b14" stroke="#7dd3fc" stroke-width="1.3"/>
  <circle cx="22" cy="10" r="2.2" fill="#7dd3fc" fill-opacity="0.7"/>
  <circle cx="19" cy="32" r="2.0" fill="#7dd3fc" fill-opacity="0.55"/>
  <circle cx="22" cy="54" r="2.2" fill="#7dd3fc" fill-opacity="0.7"/>

  <!-- K — nodes -->
  <circle cx="35" cy="10" r="2.8" fill="#060b14" stroke="#aacfee" stroke-width="1.1"/>
  <circle cx="35" cy="32" r="4.0" fill="#060b14" stroke="#ffffff" stroke-width="1.7"/>
  <circle cx="35" cy="32" r="1.8" fill="#ffffff"/>
